name: Estatistica multimodelo

# Calcula estatisticas agregadas das 7 IAs materializadas e publica
# docs/dados/estatistica.json. Nao exporta texto de chamado.

on:
  # Agendamento periodico (a cada 6h) para manter a estatistica fresca, alem dos
  # gatilhos por workflow_run apos os fluxos que alteram dados.
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Multimodelo - classificacao completa"
      - "Comparar modelos (lote)"
      - "Reclassificar validados (M e N) -> coluna O"
      - "Transformer fine-tuning (BERTimbau)"
    types:
      - completed

concurrency:
  group: estatistica
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  estatistica:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements-estatistica.txt"
      - name: Instalar dependencias estatisticas
        run: python -m pip install --retries 5 --timeout 120 -r requirements-estatistica.txt
      - name: Recriar chave da conta de servico
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then echo "Secret GCP_SA_KEY ausente." >&2; exit 1; fi
          printf '%s' "$GCP_SA_KEY" > credenciais_sa.json
      - name: Calcular estatisticas
        run: python src/analise_estatistica.py
      - name: Remover credenciais
        if: always()
        run: rm -f credenciais_sa.json
      - name: Commit estatistica
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dados/estatistica.json
          git diff --cached --quiet && { echo "sem mudancas estatisticas"; exit 0; }
          git commit -m "dados estatisticos [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push rejeitado (tentativa $i/5); novo rebase em 5s"; sleep 5
          done
          echo "push falhou apos 5 tentativas" >&2; exit 1
