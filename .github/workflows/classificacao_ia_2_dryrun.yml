name: Classificacao IA 2 - dry-run

on:
  workflow_dispatch:
    inputs:
      limite:
        description: "Quantidade maxima de candidatos"
        default: "200"
      usar_minilm:
        description: "Usar MiniLM robusto como voto adicional"
        type: boolean
        default: true
      incluir_sem_mn:
        description: "Incluir candidatos sem M/N completas"
        type: boolean
        default: false
      aplicar_abas:
        description: "Gravar abas COMITE/DRYRUN sem gravar coluna O"
        type: boolean
        default: true

concurrency:
  group: escrita-planilha
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  classificacao-ia-2-dryrun:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements-leves.txt
            requirements-robusto.txt
      - name: Instalar dependencias leves
        run: python -m pip install --retries 5 --timeout 120 -r requirements-leves.txt
      - name: Instalar MiniLM robusto
        if: ${{ github.event.inputs.usar_minilm == 'true' }}
        run: python -m pip install --retries 5 --timeout 180 -r requirements-robusto.txt
      - name: Recriar chave da conta de servico
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then echo "Secret GCP_SA_KEY ausente." >&2; exit 1; fi
          printf '%s' "$GCP_SA_KEY" > credenciais_sa.json
      - name: Rodar comite em dry-run
        run: |
          CMD="python src/classificacao_ia_2_comite.py --limite '${{ github.event.inputs.limite || '200' }}'"
          if [ "${{ github.event.inputs.usar_minilm }}" = "true" ]; then
            CMD="$CMD --usar-minilm"
          fi
          if [ "${{ github.event.inputs.incluir_sem_mn }}" = "true" ]; then
            CMD="$CMD --incluir-sem-mn"
          fi
          if [ "${{ github.event.inputs.aplicar_abas }}" = "true" ]; then
            CMD="$CMD --aplicar"
          fi
          eval "$CMD"
      - name: Remover credenciais
        if: always()
        run: rm -f credenciais_sa.json
