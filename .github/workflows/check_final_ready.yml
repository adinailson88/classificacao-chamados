name: Check final ready

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-final-ready:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Verificar prontidao tecnica
        run: python src/check_final_ready.py
