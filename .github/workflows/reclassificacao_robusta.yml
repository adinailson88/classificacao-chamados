name: Reclassificacao robusta (modelo pesado)

# 3o modelo: "quase-LLM" local (embeddings de transformer multilingue, sem APIs
# externas). PESADO -> deve rodar manualmente e, por padrao, em dry-run.
# O dry-run anterior da reclassificacao teve ganho liquido negativo; por isso
# nao deve escrever na planilha antes da calibracao por modelo.

on:
  workflow_dispatch:
    inputs:
      max_turnos:
        description: "Turnos de 15 por execucao (poucos!)"
        default: "2"
      aplicar:
        description: "Gravar na planilha (false = dry-run)"
        type: boolean
        default: false

concurrency:
  group: escrita-planilha
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  robusto:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-robusto.txt
      - run: python -m pip install --retries 5 --timeout 120 -r requirements.txt
      - name: Instalar modelo robusto (transformer)
        run: python -m pip install --retries 5 --timeout 120 -r requirements-robusto.txt
      - name: Recriar chave da conta de servico
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then echo "Secret GCP_SA_KEY ausente." >&2; exit 1; fi
          printf '%s' "$GCP_SA_KEY" > credenciais_sa.json
      - name: Reclassificar com modelo robusto (manual; dry-run por padrao)
        run: |
          if [ "${{ github.event.inputs.aplicar }}" = "true" ]; then
            python src/executar_etapa2.py --modelo robusto --max-turnos "${{ github.event.inputs.max_turnos || '2' }}" --aplicar
          else
            python src/executar_etapa2.py --modelo robusto --max-turnos "${{ github.event.inputs.max_turnos || '2' }}"
          fi
      - name: Remover credenciais
        if: always()
        run: rm -f credenciais_sa.json
