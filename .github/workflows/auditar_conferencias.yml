name: Auditar conferencias humanas

on:
  workflow_dispatch:
    inputs:
      aplicar:
        description: "Gravar aba privada AUDITORIA_CONFERENCIAS (false = so JSON sanitizado)"
        type: boolean
        default: false

concurrency:
  group: escrita-planilha
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  auditar-conferencias:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-leves.txt
      - name: Instalar dependencias leves
        run: python -m pip install --retries 5 --timeout 120 -r requirements-leves.txt
      - name: Recriar chave da conta de servico
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then echo "Secret GCP_SA_KEY ausente." >&2; exit 1; fi
          printf '%s' "$GCP_SA_KEY" > credenciais_sa.json
      - name: Auditar conferencias
        run: |
          if [ "${{ github.event.inputs.aplicar }}" = "true" ]; then
            python src/auditar_conferencias.py --aplicar
          else
            python src/auditar_conferencias.py
          fi
      - name: Remover credenciais
        if: always()
        run: rm -f credenciais_sa.json
      - name: Commit do JSON sanitizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dados/auditoria_conferencias.json
          git diff --cached --quiet && { echo "sem mudancas na auditoria"; exit 0; }
          git commit -m "auditoria de conferencias [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push rejeitado (tentativa $i/5); novo rebase em 5s"; sleep 5
          done
          echo "push falhou apos 5 tentativas" >&2; exit 1
