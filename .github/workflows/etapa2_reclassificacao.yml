name: Etapa 2 - reclassificacao

# Roteiro, Etapa 2 (17-23): reavalia os chamados de baixa confianca (<95%) da
# Etapa 1, em turnos, medindo ganho liquido (corrigidos - prejudicados). Disparo
# manual (so faz sentido depois que a Etapa 1 estiver concluida ou avancada).

on:
  workflow_dispatch:
    inputs:
      modelo:
        description: "Modelo de reclassificacao"
        type: choice
        default: producao
        options:
          - producao
          - baseline
      max_turnos:
        description: "Turnos de 15 por execucao"
        default: "40"

concurrency:
  group: escrita-planilha
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reclassificar:
    runs-on: ubuntu-latest
    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"
      - run: python -m pip install --retries 5 --timeout 120 -r requirements.txt
      - name: Recriar chave da conta de servico
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then echo "Secret GCP_SA_KEY ausente." >&2; exit 1; fi
          printf '%s' "$GCP_SA_KEY" > credenciais_sa.json
      - name: Reclassificar
        run: >
          python src/executar_etapa2.py
          --modelo "${{ github.event.inputs.modelo || 'producao' }}"
          --max-turnos "${{ github.event.inputs.max_turnos || '40' }}"
          --aplicar
      - name: Remover credenciais
        if: always()
        run: rm -f credenciais_sa.json
