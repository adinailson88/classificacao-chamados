name: Reclassificar validados (M e N) -> coluna O

# Reclassifica manualmente os chamados ja validados pela conferencia dupla
# (coluna M = CONFERENCIA GLPI e coluna N = CONFERENCIA IA preenchidas) e ainda sem
# reclassificacao (coluna O vazia). O modelo "robusto" usa MiniLM + classificador
# local; "transformer_ft" usa BERTimbau fine-tuning e deve ser preferido apenas
# quando sua execucao pesada for intencional. Grava O somente com confirmacao.
#
# Cadencia: a cada 15 min, no MAXIMO 15 chamados por execucao (1 turno). O script so
# treina o modelo quando ha chamados validados pendentes; sem candidatos, e no-op barato.

on:
  # Cron */15 (robusto MiniLM) PAUSADO em 2026-06-06: a coluna O passou a ser de
  # responsabilidade do transformer_ft (BERTimbau fine-tuning, ver transformer_ft.yml),
  # para nao competir na escrita de O. Mantido como disparo manual de contingencia.
  # schedule:
  #   - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      max_turnos:
        description: "Turnos de 15 por execucao"
        default: "1"
      modelo:
        description: "Modelo de reclassificacao"
        type: choice
        default: robusto
        options:
          - robusto
          - transformer_ft
          - producao
          - baseline
      aplicar:
        description: "Gravar na coluna O (false = dry-run)"
        type: boolean
        default: false
      confirmacao:
        description: "Para gravar coluna O com aplicar=true, digite APLICAR_O"
        default: ""

concurrency:
  group: escrita-planilha
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reclassificar-validados:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements-leves.txt
            requirements-robusto.txt
      - name: Instalar dependencias leves
        run: python -m pip install --retries 5 --timeout 120 -r requirements-leves.txt
      - name: Instalar modelo robusto (transformer)
        run: python -m pip install --retries 5 --timeout 120 -r requirements-robusto.txt
      - name: Instalar transformer fine-tuning se solicitado
        if: ${{ github.event.inputs.modelo == 'transformer_ft' }}
        run: python -m pip install --retries 5 --timeout 180 -r requirements-transformer.txt
      - name: Recriar chave da conta de servico
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then echo "Secret GCP_SA_KEY ausente." >&2; exit 1; fi
          printf '%s' "$GCP_SA_KEY" > credenciais_sa.json
      - name: Reclassificar validados (robusto -> coluna O)
        run: |
          MT="${{ github.event.inputs.max_turnos }}"; MT="${MT:-1}"
          MODELO="${{ github.event.inputs.modelo }}"; MODELO="${MODELO:-robusto}"
          echo "modelo=$MODELO"
          if [ "${{ github.event.inputs.aplicar }}" = "true" ]; then
            if [ "${{ github.event.inputs.confirmacao }}" != "APLICAR_O" ]; then
              echo "Para gravar a coluna O, confirme com confirmacao=APLICAR_O." >&2
              exit 1
            fi
            python src/reclassificar_validados.py --modelo "$MODELO" --max-turnos "$MT" --aplicar
          else
            python src/reclassificar_validados.py --modelo "$MODELO" --max-turnos "$MT"
          fi
      - name: Remover credenciais
        if: always()
        run: rm -f credenciais_sa.json
