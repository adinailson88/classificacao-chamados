name: Relevancia de termos + mapa de correlacao

# Calcula termos caracteristicos por categoria (log-odds + TF-IDF), o mapa de
# correlacao vocabular entre categorias e o CRUZAMENTO confusao IA x historico x
# correlacao (candidatos a revisao de taxonomia). So LE a planilha; gera agregados
# sanitizados em docs/dados/ (sem texto de chamado) e os commita para o painel.
# Com aplicar=true grava tambem as abas privadas RELEVANCIA_TERMOS,
# CORRELACAO_CATEGORIAS e CRUZAMENTO_TAXONOMIA.

on:
  workflow_dispatch:
    inputs:
      aplicar:
        description: "Gravar abas privadas na planilha (alem dos JSON)"
        type: boolean
        default: false
      top_n:
        description: "Termos por categoria em cada ranking"
        default: "25"
      min_df:
        description: "Frequencia minima do termo (anti-ruido/identificavel)"
        default: "5"
      min_chamados_categoria:
        description: "Ignorar categorias com menos chamados que isto"
        default: "10"

concurrency:
  group: escrita-planilha
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  relevancia-termos:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-leves.txt
      - name: Instalar dependencias leves
        run: python -m pip install --retries 5 --timeout 120 -r requirements-leves.txt
      - name: Recriar chave da conta de servico
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then echo "Secret GCP_SA_KEY ausente." >&2; exit 1; fi
          printf '%s' "$GCP_SA_KEY" > credenciais_sa.json
      - name: Rodar relevancia de termos
        run: |
          CMD="python src/relevancia_termos.py --top-n '${{ github.event.inputs.top_n || '25' }}' --min-df '${{ github.event.inputs.min_df || '5' }}' --min-chamados-categoria '${{ github.event.inputs.min_chamados_categoria || '10' }}'"
          if [ "${{ github.event.inputs.aplicar }}" = "true" ]; then
            CMD="$CMD --aplicar"
          fi
          eval "$CMD"
      - name: Rodar cruzamento confusao x correlacao (taxonomia)
        run: |
          CMD="python src/cruzamento_taxonomia.py --min-df '${{ github.event.inputs.min_df || '5' }}' --min-chamados-categoria '${{ github.event.inputs.min_chamados_categoria || '10' }}'"
          if [ "${{ github.event.inputs.aplicar }}" = "true" ]; then
            CMD="$CMD --aplicar"
          fi
          eval "$CMD"
      - name: Remover credenciais
        if: always()
        run: rm -f credenciais_sa.json
      - name: Commit dos dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dados/termos_relevantes.json docs/dados/correlacao_categorias.json docs/dados/confusao_historico_ia.json docs/dados/cruzamento_taxonomia.json
          git diff --cached --quiet && { echo "sem mudancas nos dados"; exit 0; }
          git commit -m "termos + correlacao + cruzamento de taxonomia [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push rejeitado (tentativa $i/5); novo rebase em 5s"; sleep 5
          done
          echo "push falhou apos 5 tentativas" >&2; exit 1
