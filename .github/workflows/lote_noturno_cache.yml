name: Lote noturno com cache da planilha

# Reduz cota do Google Sheets: le a planilha uma vez, grava cache efemero em
# dados/cache_planilha.json (gitignored) e roda os calculos agregados sobre esse
# snapshot local. So docs/dados/*.json e commitado.

on:
  schedule:
    # 02:30 America/Bahia = 05:30 UTC.
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      min_validados:
        description: "Minimo de chamados com decisao travada para avaliacao final"
        default: "50"
      n_boot:
        description: "Reamostragens bootstrap"
        default: "2000"
      k_folds:
        description: "Folds para ensembles out-of-fold"
        default: "5"

concurrency:
  group: lote-noturno-cache
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  lote-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-estatistica.txt
      - name: Instalar dependencias estatisticas
        run: python -m pip install --retries 5 --timeout 120 -r requirements-estatistica.txt
      - name: Recriar chave da conta de servico
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then echo "Secret GCP_SA_KEY ausente." >&2; exit 1; fi
          printf '%s' "$GCP_SA_KEY" > credenciais_sa.json
      - name: Atualizar cache operacional da planilha
        run: python src/atualizar_cache_planilha.py --saida dados/cache_planilha.json
      - name: Rodar calculos agregados pelo cache
        env:
          PLANILHA_CACHE_JSON: dados/cache_planilha.json
        run: |
          python src/auditar_conferencias.py
          python src/exportar_dashboard.py
          python src/relevancia_termos.py --top-n 25 --min-df 5 --min-chamados-categoria 10
          python src/cruzamento_taxonomia.py --min-df 5 --min-chamados-categoria 10
          python src/avaliacao_final.py \
            --min-validados '${{ github.event.inputs.min_validados || '50' }}' \
            --n-boot '${{ github.event.inputs.n_boot || '2000' }}' \
            --k-folds '${{ github.event.inputs.k_folds || '5' }}'
          python src/analise_erros.py --min-validados 30
          python src/analise_estatistica.py
      - name: Remover credenciais e cache bruto
        if: always()
        run: rm -f credenciais_sa.json dados/cache_planilha.json
      - name: Commit dos agregados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dados
          git diff --cached --quiet && { echo "sem mudancas nos dados"; exit 0; }
          git commit -m "lote noturno com cache da planilha [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push rejeitado (tentativa $i/5); novo rebase em 5s"; sleep 5
          done
          echo "push falhou apos 5 tentativas" >&2; exit 1
