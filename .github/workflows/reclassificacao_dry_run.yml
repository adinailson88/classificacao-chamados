name: Reclassificacao dry-run

# Testa a Etapa 2 sem gravar na planilha. Usa conta de servico apenas para ler
# os dados e montar o lote. Nao passa --aplicar.

on:
  workflow_dispatch:
    inputs:
      modelo:
        description: "Modelo de reclassificacao"
        type: choice
        default: producao
        options:
          - producao
          - baseline
          - robusto
      max_turnos:
        description: "Turnos de 15 para simular"
        default: "2"

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          if [ "${{ github.event.inputs.modelo || 'producao' }}" = "robusto" ]; then
            pip install -r requirements-robusto.txt
          fi
      - name: Recriar chave da conta de servico
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then echo "Secret GCP_SA_KEY ausente." >&2; exit 1; fi
          printf '%s' "$GCP_SA_KEY" > credenciais_sa.json
      - name: Simular reclassificacao sem gravar
        run: >
          python src/executar_etapa2.py
          --modelo "${{ github.event.inputs.modelo || 'producao' }}"
          --max-turnos "${{ github.event.inputs.max_turnos || '2' }}"
      - name: Remover credenciais
        if: always()
        run: rm -f credenciais_sa.json
