name: Avaliacao final validada (qual IA + erros)

# Roda quando a conferencia manual (M/N/P) tiver volume: calcula o acerto
# VALIDADO por IA, pesos, ensembles (out-of-fold) e a analise de erros da IA
# vs qualidade do texto (o que pedir ao solicitante). So LE a planilha; gera
# docs/dados/avaliacao_final.json e docs/dados/analise_erros.json (sanitizados,
# sem texto de chamado) e os commita para o painel (aba Decisao).
# Enquanto validados < minimo, os JSON saem com status aguardando_validacao.

on:
  workflow_dispatch:
    inputs:
      min_validados:
        description: "Minimo de chamados com decisao travada para emitir numeros"
        default: "50"
      n_boot:
        description: "Reamostragens bootstrap (IC95)"
        default: "2000"
      k_folds:
        description: "Folds para pesos out-of-fold dos ensembles"
        default: "5"

concurrency:
  group: escrita-planilha
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  avaliacao-final:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-estatistica.txt
      - name: Instalar dependencias (estatistica)
        run: python -m pip install --retries 5 --timeout 120 -r requirements-estatistica.txt
      - name: Recriar chave da conta de servico
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then echo "Secret GCP_SA_KEY ausente." >&2; exit 1; fi
          printf '%s' "$GCP_SA_KEY" > credenciais_sa.json
      - name: Avaliacao final (qual IA, peso, ensemble)
        run: |
          python src/avaliacao_final.py \
            --min-validados '${{ github.event.inputs.min_validados || '50' }}' \
            --n-boot '${{ github.event.inputs.n_boot || '2000' }}' \
            --k-folds '${{ github.event.inputs.k_folds || '5' }}'
      - name: Analise de erros (por que a IA erra / o que pedir ao solicitante)
        run: |
          python src/analise_erros.py \
            --min-validados '30'
      - name: Remover credenciais
        if: always()
        run: rm -f credenciais_sa.json
      - name: Commit dos dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dados/avaliacao_final.json docs/dados/analise_erros.json
          git diff --cached --quiet && { echo "sem mudancas nos dados"; exit 0; }
          git commit -m "avaliacao final validada + analise de erros [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push rejeitado (tentativa $i/5); novo rebase em 5s"; sleep 5
          done
          echo "push falhou apos 5 tentativas" >&2; exit 1
