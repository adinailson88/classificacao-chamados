name: Atualizar dashboard

# Exporta os agregados (sem texto de chamado) para docs/dados/*.json e commita,
# alimentando o site estatico (GitHub Pages, pasta /docs). So LE a planilha.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Etapa 1 - classificacao progressiva"
      - "Etapa 2 - reclassificacao"
      - "Comparar modelos (lote)"
      - "Multimodelo - classificacao completa"
      - "Multimodelo - reclassificacao"
      - "Resetar experimento (zero)"
    types:
      - completed

concurrency:
  group: dashboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  dashboard:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: python -m pip install --retries 5 --timeout 120 gspread google-auth
      - name: Recriar chave da conta de servico
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then echo "Secret GCP_SA_KEY ausente." >&2; exit 1; fi
          printf '%s' "$GCP_SA_KEY" > credenciais_sa.json
      - name: Exportar JSON do dashboard
        run: python src/exportar_dashboard.py
      - name: Remover credenciais
        if: always()
        run: rm -f credenciais_sa.json
      - name: Commit dos dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dados
          git diff --cached --quiet && { echo "sem mudancas nos dados"; exit 0; }
          git commit -m "dados do dashboard [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push rejeitado (tentativa $i/5); novo rebase em 5s"; sleep 5
          done
          echo "push falhou apos 5 tentativas" >&2; exit 1
