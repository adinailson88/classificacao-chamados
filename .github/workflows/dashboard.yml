name: Atualizar dashboard

# Exporta os agregados (sem texto de chamado) para docs/dados/*.json e commita,
# alimentando o site estatico (GitHub Pages, pasta /docs). So LE a planilha.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: dashboard
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install gspread google-auth
      - name: Recriar chave da conta de servico
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then echo "Secret GCP_SA_KEY ausente." >&2; exit 1; fi
          printf '%s' "$GCP_SA_KEY" > credenciais_sa.json
      - name: Exportar JSON do dashboard
        run: python src/exportar_dashboard.py
      - name: Remover credenciais
        if: always()
        run: rm -f credenciais_sa.json
      - name: Commit dos dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dados
          git diff --cached --quiet || git commit -m "dados do dashboard [skip ci]"
          git push
